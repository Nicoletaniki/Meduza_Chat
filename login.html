<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meduza Chat — Login</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo-link"><img src="logo.png" alt="Meduza Logo" class="nav-logo"></a>
  <a href="index.html">Home</a>
  <a href="about.html">About</a>
  <a href="login.html" class="active">Login</a>
  <a href="chat.html">Chat</a>
  <a href="contact.html">Contact</a>
</nav>

<div class="page">
  <div class="container" style="max-width:520px">

    <div class="section-header animate-in">
      <span class="section-label">Identificare</span>
      <h2>Intră</h2>
      <div class="divider"><span>✦</span></div>
    </div>

    <div class="card animate-in" style="animation-delay:0.15s">
      <div class="card-ornament">✦ &nbsp;&nbsp; ✦ &nbsp;&nbsp; ✦</div>

      <div class="form-group">
        <label class="form-label">Nume</label>
        <input class="form-input" type="text" placeholder="Cum să te chemăm...">
      </div>

      <div class="form-group">
        <label class="form-label">Parolă</label>
        <input class="form-input" type="password" placeholder="Secretul tău...">
      </div>

      <div style="margin-top: 32px; text-align: center;">
        <a href="chat.html" class="btn btn-primary">Intră în Umbră</a>
      </div>

      <p style="text-align:center; margin-top:24px; font-size:14px; color: var(--text-faint); font-style:italic;">
        Nicio parolă nu e stocată. Ești la adăpost.
      </p>
    </div>

  </div>

  <footer>
    <span>✦</span> &nbsp; Meduza Chat &nbsp; <span>✦</span>
  </footer>
</div>

</body>
</html>
